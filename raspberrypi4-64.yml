header:
  version: 15
  includes:
    - oe5xrx.yml
    - include/raspberrypi.yml

machine: raspberrypi4-64

local_conf_header:
  rpi: |
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"
    KERNEL_DEVICETREE = "broadcom/bcm2711-rpi-cm4.dtb"
    KERNEL_MODULE_AUTOLOAD:rpi += " i2c-dev i2c-bcm2708"
    ENABLE_I2C = "1"
    # otg_mode=1 makes the RPi GPU firmware enable the XHCI USB2 host controller
    # (standards-compliant split-transaction handling — required for the full-speed
    # FM module behind the high-speed FE1.1s hub; the CM4-native dwc2/dwc_otg
    # drivers both fail this topology). The firmware applies this to the DTB it
    # passes to u-boot; boot.cmd now boots THAT firmware DTB via ${fdt_addr}
    # (instead of loading its own rootfs DTB), so config.txt directives finally
    # take effect. See docs/superpowers/specs/2026-07-24-cm4-usb-firmware-dtb.md.
    RPI_EXTRA_CONFIG = "\notg_mode=1\n"
    # Dev-only: allow root login with empty password on the serial console.
    # For production, drop this and rely on the station-agent terminal (with
    # proper auth) for remote access + a provisioned recovery password.
    EXTRA_IMAGE_FEATURES += "debug-tweaks"
