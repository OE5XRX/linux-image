# OE5XRX A/B boot — GRUB version.
#
# Mirrors the U-Boot boot.cmd logic:
#   boot_part          "a" or "b"
#   bootcount          incremented each attempt
#   bootlimit          max attempts before rollback (default 3)
#   upgrade_available  1 = in trial after OTA, 0 = committed
#
# State is stored in /boot/grub/grubenv (grub-editenv compatible).

# Force serial console — OVMF defaults to graphical framebuffer which
# is invisible with QEMU -nographic.
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial console
terminal_output serial console

set timeout=3

load_env

# Defaults on first boot / after env wipe.
if [ -z "${boot_part}" ]; then
    set boot_part=a
fi
if [ -z "${bootcount}" ]; then
    set bootcount=0
fi
if [ -z "${upgrade_available}" ]; then
    set upgrade_available=0
fi
if [ -z "${bootlimit}" ]; then
    set bootlimit=3
fi

# Increment bootcount BEFORE trying to boot.
# GRUB doesn't have arithmetic — use a chain of if/elif.
if [ "${bootcount}" = "0" ]; then set bootcount=1;
elif [ "${bootcount}" = "1" ]; then set bootcount=2;
elif [ "${bootcount}" = "2" ]; then set bootcount=3;
elif [ "${bootcount}" = "3" ]; then set bootcount=4;
elif [ "${bootcount}" = "4" ]; then set bootcount=5;
else set bootcount=99;
fi
save_env bootcount

# Rollback if in trial and limit exceeded.
if [ "${upgrade_available}" = "1" ]; then
    if [ "${bootcount}" -gt "${bootlimit}" ]; then
        echo "OE5XRX: Trial boot failed ${bootlimit} times — rolling back."
        if [ "${boot_part}" = "a" ]; then
            set boot_part=b
        else
            set boot_part=a
        fi
        set bootcount=1
        set upgrade_available=0
        save_env boot_part bootcount upgrade_available
    fi
fi

echo "OE5XRX: booting slot ${boot_part} (attempt ${bootcount}/${bootlimit}, trial=${upgrade_available})"

# Resolve root partition label.
set root_label=root_${boot_part}

# Kernel lives on the EFI partition under /boot/ (single kernel for now;
# per-slot kernels in boot_a/boot_b are a future enhancement).
linux /bzImage root=PARTLABEL=${root_label} ro rootwait console=ttyS0,115200 net.ifnames=0
boot
