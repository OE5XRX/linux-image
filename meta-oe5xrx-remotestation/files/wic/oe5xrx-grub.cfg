# OE5XRX A/B boot — GRUB version.
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial console
terminal_output serial console

set timeout=0

load_env

if [ -z "$boot_part" ]; then set boot_part=a; fi
if [ -z "$bootcount" ]; then set bootcount=0; fi
if [ -z "$upgrade_available" ]; then set upgrade_available=0; fi
if [ -z "$bootlimit" ]; then set bootlimit=3; fi

# Increment bootcount.
if [ "$bootcount" = "0" ]; then set bootcount=1;
elif [ "$bootcount" = "1" ]; then set bootcount=2;
elif [ "$bootcount" = "2" ]; then set bootcount=3;
elif [ "$bootcount" = "3" ]; then set bootcount=4;
elif [ "$bootcount" = "4" ]; then set bootcount=5;
else set bootcount=99;
fi
save_env bootcount

# Rollback if in trial and limit exceeded.
if [ "$upgrade_available" = "1" ]; then
    if [ "$bootcount" -gt "$bootlimit" ]; then
        echo "OE5XRX: Trial failed -- rolling back"
        if [ "$boot_part" = "a" ]; then set boot_part=b; else set boot_part=a; fi
        set bootcount=1
        set upgrade_available=0
        save_env boot_part bootcount upgrade_available
    fi
fi

echo "OE5XRX: slot=${boot_part} attempt=${bootcount}/${bootlimit} trial=${upgrade_available}"

# Load the kernel from INSIDE the active slot's rootfs, so the kernel always
# matches its /lib/modules and ext4 (OTA writes the whole rootfs atomically).
# GRUB script has no `||`; use `if <cmd>; then ...; fi`. `search --label`
# matches the ext4 filesystem label (wic sets it == the GPT partlabel).
set root_label=root_${boot_part}
if search --no-floppy --label ${root_label} --set=root ; then
    linux /boot/bzImage root=PARTLABEL=${root_label} ro rootwait fsck.repair=yes net.ifnames=0 panic=5 softlockup_panic=1 console=tty0 console=ttyS0,115200
    boot
fi

# Fail-fast: search failed or boot returned (kernel/FS unreadable). bootcount
# was already incremented+saved above, so rebooting progresses toward A/B
# rollback. `reboot` needs its module built into bootx64.efi (see grub-efi bbappend).
reboot
