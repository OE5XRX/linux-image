CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_CORE=y
# RPi CM4 / BCM2711 SoC watchdog
CONFIG_BCM2835_WDT=y
# QEMU/Proxmox emulated watchdog (q35 / -device i6300esb)
CONFIG_I6300ESB_WDT=y
# Lockup/hung-task detectors so the cmdline `softlockup_panic=1` and the sysctl
# `kernel.hung_task_panic=1` are actually honored (without these the kernel
# reports them as unknown and they are no-ops — turning a silent hang into a
# panic-then-reboot is the whole point of the boot-robustness layer).
CONFIG_SOFTLOCKUP_DETECTOR=y
CONFIG_DETECT_HUNG_TASK=y
