# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-oe5xrx-remotestation"
BBFILE_PATTERN_meta-oe5xrx-remotestation = "^${LAYERDIR}/"
# Priority 15 is above meta-raspberrypi (9) and meta-openembedded (typ. 7)
# so our bbappends (e.g. base-files_%.bbappend) run AFTER theirs.
BBFILE_PRIORITY_meta-oe5xrx-remotestation = "15"

LAYERDEPENDS_meta-oe5xrx-remotestation = "core"
LAYERSERIES_COMPAT_meta-oe5xrx-remotestation = "scarthgap"
