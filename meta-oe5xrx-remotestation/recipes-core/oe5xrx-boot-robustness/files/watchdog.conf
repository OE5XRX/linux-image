# systemd pets /dev/watchdog every RuntimeWatchdogSec/2; if systemd or the box
# wedges, the hardware watchdog fires -> reset -> bootcount -> A/B rollback.
# Kept at 14 s so the SAME value works on both platforms: the RPi BCM2835/2711
# SoC watchdog maxes out at ~15 s, so 30 s would be clamped there. i6300esb (x86)
# handles 14 s fine. One config, both platforms.
[Manager]
RuntimeWatchdogSec=14
ShutdownWatchdogSec=2min
