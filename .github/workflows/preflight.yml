name: Preflight

# Reusable cheap release preflight (no Yocto spin-up): fails within seconds if
# the station-agent recipe still uses ${AUTOREV}, or if the pinned FW-RemoteStation
# FM artifacts are unpinned / unsigned. Called by both tag-release.yml (before
# tagging) and release.yml (defence-in-depth at the tagged commit). A release must
# be reproducible.
on:
  workflow_call: {}

jobs:
  preflight:
    name: Require pinned SRCREV + signed FM artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fail if station-agent SRCREV is AUTOREV
        run: |
          set -euo pipefail
          recipe=meta-oe5xrx-remotestation/recipes-core/station-agent/station-agent_0.1.0.bb
          if [ ! -f "$recipe" ]; then
            echo "::error file=$recipe::Recipe not found"
            exit 1
          fi
          # Tolerate leading whitespace — BitBake accepts it even if
          # style-wise nobody writes recipes that way.
          line=$(grep -E '^[[:space:]]*SRCREV[[:space:]]*=' "$recipe" || true)
          if [ -z "$line" ]; then
            echo "::error file=$recipe::No SRCREV line found"
            exit 1
          fi
          echo "Found: $line"
          if printf '%s' "$line" | grep -qF '${AUTOREV}'; then
            echo "::error file=$recipe::SRCREV is \${AUTOREV} — run scripts/pin-station-agent.sh before releasing"
            exit 1
          fi
          raw=$(printf '%s\n' "$line" | sed -nE 's/^[[:space:]]*SRCREV[[:space:]]*=[[:space:]]*(.*)$/\1/p')
          sha=$(printf '%s' "$raw" | sed -E 's/^"([^"]*)".*$/\1/; s/^'"'"'([^'"'"']*)'"'"'.*$/\1/')
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "::error file=$recipe::SRCREV value '$sha' is not a full 40-char SHA"
            exit 1
          fi
          echo "OK — station-agent pinned to $sha"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Fail if FM artifacts are unpinned or unsigned
        # Single source of truth: bump-fw-release.sh --check re-fetches every pinned
        # FW-RemoteStation asset (native_sim, SA818 emulator, real .bin) at the tag
        # in conf/oe5xrx-fw-release.inc, cosign-verifies each and asserts the recipe
        # sha256 still matches the release SHA256SUMS. Same verify logic the pin path
        # uses — no duplicated bash-in-yaml, and it covers all three assets.
        run: scripts/bump-fw-release.sh --check
