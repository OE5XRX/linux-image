name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate recipes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install kas + linters
        run: |
          pip install --quiet kas
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck yamllint udev

      - name: Verify kas configs parse (qemux86-64)
        run: kas dump qemux86-64.yml > /dev/null

      - name: Verify kas configs parse (raspberrypi4-64)
        run: kas dump raspberrypi4-64.yml > /dev/null

      - name: Lint shell scripts
        run: |
          find meta-oe5xrx-remotestation -name '*.sh' -print0 \
            | xargs -0 -r shellcheck -e SC1091 -e SC2039
          # New scripts added by the boot/OTA test work (lint explicitly rather
          # than the whole scripts/ dir, which carries pre-existing intentional
          # warnings, e.g. run-qemu.sh's word-splitting ${CPU_FLAGS}).
          shellcheck -e SC1091 -e SC2039 \
            scripts/l0a-fstab-uuid-lint.sh \
            scripts/compute-release-version.sh \
            scripts/release.sh

      - name: Lint YAML
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable, comments-indentation: disable, indentation: {check-multi-line-strings: false}}}" \
            .github/workflows/ *.yml

      - name: Verify wks files have partitions
        run: |
          for wks in meta-oe5xrx-remotestation/wic/*.wks.in; do
            echo "Checking $wks..."
            grep -q '^part' "$wks" || { echo "  No partitions defined"; exit 1; }
          done

      - name: Verify udev slot rules syntax
        # udev is installed in the "Install kas + linters" step above.
        run: udevadm verify meta-oe5xrx-remotestation/recipes-core/oe5xrx-slot-udev/files/90-oe5xrx-slots.rules

      - name: L0a — static fstab UUID-mount guard
        # Fast counterpart to the L0b ROOTFS_POSTPROCESS assertion: flag any
        # wks --use-uuid mount without --no-fstab-update (the #37 bug class).
        run: scripts/l0a-fstab-uuid-lint.sh .

      - name: OTA-integration unit tests
        run: |
          pip install --quiet -r tests/ota-integration/requirements.txt
          python -m pytest tests/ota-integration -m unit -q

  sim-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Real-binary harness E2E
        run: bash tests/sim-harness/test_sim_harness.sh
      - name: Shellcheck harness + pin scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -e SC1091 -e SC2039 \
            meta-oe5xrx-remotestation/recipes-core/oe5xrx-sim-harness/files/sim-harness.sh \
            tests/sim-harness/test_sim_harness.sh \
            scripts/bump-fw-release.sh
