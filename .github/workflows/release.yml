name: Release

# Runs on release-tag push. Builds BOTH images (x86-64 + Raspberry Pi),
# checksums them, signs the bundles with cosign keyless (Sigstore + OIDC),
# and publishes a GitHub Release with everything attached.
#
# Tag format is YYYY.MM.DD-HH (UTC), with an optional single lowercase
# letter [a-z] suffix for same-hour hotfixes. See scripts/release.sh.
#
# The legacy v* tags (v1-alpha ... v1-delta) stay on GitHub as
# historical releases — run-qemu.sh can still fetch them — but pushing
# a new v* tag will NOT trigger a build. Only the timestamp format is
# accepted going forward.
on:
  push:
    tags:
      # YYYY.MM.DD-HH (no suffix) — the common case
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-[0-9][0-9]'
      # YYYY.MM.DD-HH[a-z] — same-hour hotfix
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-[0-9][0-9][a-z]'

permissions:
  contents: write       # create release, upload assets
  id-token: write       # cosign keyless OIDC token
  actions: read         # download-artifact from called workflows

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cheap preflight gate: makes the build fail within seconds (no Yocto
  # spin-up) if the station-agent recipe still uses ${AUTOREV}. On a
  # release tag we require a pinned SHA so the image is reproducible —
  # otherwise a later rebuild of the same tag could silently pick up a
  # different agent revision. See scripts/pin-station-agent.sh.
  preflight:
    name: Preflight — require pinned SRCREV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fail if station-agent SRCREV is AUTOREV
        run: |
          set -euo pipefail
          recipe=meta-oe5xrx-remotestation/recipes-core/station-agent/station-agent_0.1.0.bb
          if [ ! -f "$recipe" ]; then
            echo "::error file=$recipe::Recipe not found"
            exit 1
          fi
          # Tolerate leading whitespace — BitBake accepts it even if
          # style-wise nobody writes recipes that way.
          line=$(grep -E '^[[:space:]]*SRCREV[[:space:]]*=' "$recipe" || true)
          if [ -z "$line" ]; then
            echo "::error file=$recipe::No SRCREV line found"
            exit 1
          fi
          echo "Found: $line"
          if printf '%s' "$line" | grep -qF '${AUTOREV}'; then
            echo "::error file=$recipe::SRCREV is \${AUTOREV} on a release tag — run scripts/pin-station-agent.sh before tagging"
            exit 1
          fi
          # Strip the `SRCREV =` prefix, then peel off surrounding
          # quotes — accept both " and ' since BitBake allows either.
          # Using sed -n+p so a non-match yields empty output and the
          # 40-char regex check below surfaces a clear error rather
          # than the whole unparsed line.
          raw=$(printf '%s\n' "$line" | sed -nE 's/^[[:space:]]*SRCREV[[:space:]]*=[[:space:]]*(.*)$/\1/p')
          sha=$(printf '%s' "$raw" | sed -E 's/^"([^"]*)".*$/\1/; s/^'"'"'([^'"'"']*)'"'"'.*$/\1/')
          # Git accepts mixed-case hex for commit IDs (the Yocto fetcher
          # doesn't care either). Reject anything that isn't exactly 40
          # hex chars, but allow upper/lowercase — otherwise a human-pasted
          # SHA from GitHub's UI could fail preflight despite being valid.
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "::error file=$recipe::SRCREV value '$sha' is not a full 40-char SHA"
            exit 1
          fi
          echo "OK — station-agent pinned to $sha"

  build-x64:
    name: Build qemux86-64
    needs: preflight
    uses: ./.github/workflows/build.yml
    with:
      machine: qemux86-64
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  build-rpi:
    name: Build raspberrypi4-64
    # Each target has its own cache volume, so the two builds run in
    # parallel. Both still gate on preflight.
    needs: preflight
    uses: ./.github/workflows/build.yml
    with:
      machine: raspberrypi4-64
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  release:
    name: Sign & Publish Release
    needs: [build-x64, build-rpi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download x86-64 artifact
        uses: actions/download-artifact@v8
        with:
          name: yocto-image-qemux86-64
          path: staging/qemux86-64

      - name: Download Raspberry Pi artifact
        uses: actions/download-artifact@v8
        with:
          name: yocto-image-raspberrypi4-64
          path: staging/raspberrypi4-64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Package, checksum, sign
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release
          for machine in qemux86-64 raspberrypi4-64; do
            # Prefer compressed wic, fall back to raw wic. CI uploads both
            # if the image recipe emits them — we only ship one.
            src=""
            srcext=""
            for ext in wic.bz2 wic.xz wic.gz wic; do
              match=$(ls "staging/${machine}"/*.${ext} 2>/dev/null | head -1 || true)
              if [ -n "${match}" ]; then
                src="${match}"
                srcext="${ext}"
                break
              fi
            done
            if [ -z "${src}" ]; then
              echo "No image artifact for ${machine}" >&2
              exit 1
            fi

            dest="release/oe5xrx-${machine}-${TAG}.${srcext}"
            cp "${src}" "${dest}"
            (cd release && sha256sum "$(basename "${dest}")" > "$(basename "${dest}").sha256")

            # Keyless signing — binds the signature to this repo + workflow +
            # tag via the GitHub Actions OIDC token. Verifiable later with
            # `cosign verify-blob` (see SECURITY.md for the exact command).
            cosign sign-blob --yes \
              --bundle "${dest}.bundle" \
              "${dest}"
          done
          ls -lh release/

      - name: Create GitHub Release
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/oe5xrx-*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## OE5XRX Linux Image ${{ env.TAG }}

            Pre-built Yocto images for both supported targets.

            | Target | File |
            |---|---|
            | Raspberry Pi CM4 | `oe5xrx-raspberrypi4-64-${{ env.TAG }}.wic.bz2` |
            | QEMU x86-64 | `oe5xrx-qemux86-64-${{ env.TAG }}.wic.bz2` |

            Each image ships with a `.sha256` checksum and a `.bundle`
            cosign signature. Verification instructions are in
            [SECURITY.md](https://github.com/${{ env.REPO }}/blob/main/SECURITY.md).
