name: Release

# One-button release (workflow_dispatch). The workflow computes its own next
# version (YYYY.MM.DD-HH[a-z], UTC hour, letter suffix on collision), builds
# BOTH images, GATES publication on the boot + cross-build OTA integration
# test (x86), signs the bundles with cosign keyless, and publishes a GitHub
# Release. The action creates the tag from the computed version — there is no
# tag-push trigger anymore (mirrors FW-RemoteStation).
#
# dry_run=true: run preflight + version + build + gate, but do NOT sign, tag,
# or publish (use it to validate the pipeline from a feature branch).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + gate only; do not sign/tag/publish"
        type: boolean
        default: false

permissions:
  contents: write       # create release + tag, upload assets
  id-token: write       # cosign keyless OIDC token
  actions: read         # download-artifact from called workflows

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Cheap preflight gate: fails within seconds (no Yocto spin-up) if the
  # station-agent recipe still uses ${AUTOREV}, or FM artifacts are unpinned /
  # unsigned. A release must be reproducible.
  preflight:
    name: Preflight — require pinned SRCREV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fail if station-agent SRCREV is AUTOREV
        run: |
          set -euo pipefail
          recipe=meta-oe5xrx-remotestation/recipes-core/station-agent/station-agent_0.1.0.bb
          if [ ! -f "$recipe" ]; then
            echo "::error file=$recipe::Recipe not found"
            exit 1
          fi
          # Tolerate leading whitespace — BitBake accepts it even if
          # style-wise nobody writes recipes that way.
          line=$(grep -E '^[[:space:]]*SRCREV[[:space:]]*=' "$recipe" || true)
          if [ -z "$line" ]; then
            echo "::error file=$recipe::No SRCREV line found"
            exit 1
          fi
          echo "Found: $line"
          if printf '%s' "$line" | grep -qF '${AUTOREV}'; then
            echo "::error file=$recipe::SRCREV is \${AUTOREV} — run scripts/pin-station-agent.sh before releasing"
            exit 1
          fi
          raw=$(printf '%s\n' "$line" | sed -nE 's/^[[:space:]]*SRCREV[[:space:]]*=[[:space:]]*(.*)$/\1/p')
          sha=$(printf '%s' "$raw" | sed -E 's/^"([^"]*)".*$/\1/; s/^'"'"'([^'"'"']*)'"'"'.*$/\1/')
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "::error file=$recipe::SRCREV value '$sha' is not a full 40-char SHA"
            exit 1
          fi
          echo "OK — station-agent pinned to $sha"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Fail if FM artifacts are unpinned or unsigned
        run: |
          set -euo pipefail
          id_re='^https://github.com/OE5XRX/FW-RemoteStation/\.github/workflows/release\.yml@refs/heads/main$'
          issuer='https://token.actions.githubusercontent.com'
          recipes="
            meta-oe5xrx-remotestation/recipes-core/oe5xrx-fm-firmware/oe5xrx-fm-firmware_26.07.04.bb
            meta-oe5xrx-remotestation/recipes-core/oe5xrx-native-sim-fm/oe5xrx-native-sim-fm_26.07.21.bb
          "
          for recipe in $recipes; do
            [ -f "$recipe" ] || { echo "::error::missing $recipe"; exit 1; }
            url="$(sed -nE 's/^SRC_URI = "([^";]*).*/\1/p' "$recipe")"
            sha="$(sed -nE \
              's/^SRC_URI\[sha256sum\] = "([0-9a-fA-F]*)".*/\1/p' \
              "$recipe" | tr 'A-F' 'a-f')"
            case "$url" in
              *REPLACE*|"")
                echo "::error file=$recipe::SRC_URI unpinned"; exit 1;;
            esac
            printf '%s' "$sha" | grep -Eq '^[0-9a-f]{64}$' \
              || { echo "::error file=$recipe::sha256sum unpinned"
                   exit 1; }
            tmp="$(mktemp -d)"
            curl -fsSL "$url"        -o "$tmp/asset"
            curl -fsSL "$url.bundle" -o "$tmp/asset.bundle"
            echo "${sha}  ${tmp}/asset" | sha256sum -c -
            cosign verify-blob \
              --certificate-identity-regexp "$id_re" \
              --certificate-oidc-issuer "$issuer" \
              --bundle "$tmp/asset.bundle" "$tmp/asset"
            echo "OK — $recipe pinned + cosign-verified"
            rm -rf "$tmp"
          done

  # Compute the next version + resolve the previous release (slot A for the
  # gate's cross-build OTA test). Since nothing is tagged yet, the latest
  # existing release IS the previous one.
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cv.outputs.version }}
      last_release: ${{ steps.last.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard — real releases only on the default branch
        if: ${{ !inputs.dry_run }}
        env:
          REF: ${{ github.ref_name }}
          DEFAULT: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$REF" != "$DEFAULT" ]; then
            echo "::error::real release must run on '$DEFAULT'; use dry_run=true on a feature branch" >&2
            exit 1
          fi

      - name: Compute next version
        id: cv
        uses: ./.github/actions/compute-version

      - name: Resolve previous release (slot A)
        id: last
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag=$(gh release list -R "$REPO" -L 1 --exclude-drafts --exclude-pre-releases --json tagName -q '.[0].tagName' || true)
          echo "Previous release: ${tag:-<none>}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-x64:
    name: Build qemux86-64
    needs: [preflight, version]
    uses: ./.github/workflows/build.yml
    with:
      machine: qemux86-64
      release_tag: ${{ needs.version.outputs.version }}
    secrets: inherit

  build-rpi:
    name: Build raspberrypi4-64
    # Each target has its own cache volume, so the two builds run in
    # parallel. Both still gate on preflight + version.
    needs: [preflight, version]
    uses: ./.github/workflows/build.yml
    with:
      machine: raspberrypi4-64
      release_tag: ${{ needs.version.outputs.version }}
    secrets: inherit

  gate:
    name: Boot & OTA gate (x64)
    # The publish gate: boot the freshly built x86 image and run the
    # cross-build OTA cycle (slot A = previous release). Publication depends
    # on this passing — the two shipped OTA bugs (#36, #37) would fail here.
    needs: [version, build-x64]
    uses: ./.github/workflows/boot-ota-test.yml
    with:
      machine: qemux86-64
      new_artifact: yocto-image-qemux86-64
      expected_tag: ${{ needs.version.outputs.version }}
      last_release_tag: ${{ needs.version.outputs.last_release }}
    secrets: inherit

  release:
    name: Sign & Publish Release
    needs: [version, build-x64, build-rpi, gate]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download x86-64 artifact
        uses: actions/download-artifact@v8
        with:
          name: yocto-image-qemux86-64
          path: staging/qemux86-64

      - name: Download Raspberry Pi artifact
        uses: actions/download-artifact@v8
        with:
          name: yocto-image-raspberrypi4-64
          path: staging/raspberrypi4-64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Package, checksum, sign
        env:
          TAG: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release
          for machine in qemux86-64 raspberrypi4-64; do
            src=""
            srcext=""
            for ext in wic.bz2 wic.xz wic.gz wic; do
              match=$(ls "staging/${machine}"/*.${ext} 2>/dev/null | head -1 || true)
              if [ -n "${match}" ]; then
                src="${match}"
                srcext="${ext}"
                break
              fi
            done
            if [ -z "${src}" ]; then
              echo "No image artifact for ${machine}" >&2
              exit 1
            fi

            dest="release/oe5xrx-${machine}-${TAG}.${srcext}"
            cp "${src}" "${dest}"
            (cd release && sha256sum "$(basename "${dest}")" > "$(basename "${dest}").sha256")

            cosign sign-blob --yes \
              --bundle "${dest}.bundle" \
              "${dest}"
          done
          ls -lh release/

      - name: Create GitHub Release
        env:
          TAG: ${{ needs.version.outputs.version }}
          REPO: ${{ github.repository }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            release/oe5xrx-*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## OE5XRX Linux Image ${{ env.TAG }}

            Pre-built Yocto images for both supported targets. Published only
            after passing the boot + cross-build OTA integration gate.

            | Target | File |
            |---|---|
            | Raspberry Pi CM4 | `oe5xrx-raspberrypi4-64-${{ env.TAG }}.wic.bz2` |
            | QEMU x86-64 | `oe5xrx-qemux86-64-${{ env.TAG }}.wic.bz2` |

            Each image ships with a `.sha256` checksum and a `.bundle`
            cosign signature. Verification instructions are in
            [SECURITY.md](https://github.com/${{ env.REPO }}/blob/main/SECURITY.md).
