name: Release

# Tag-triggered build / gate / sign / publish (Flow 2 of the two-step release).
#
# This workflow is DISPATCHED AGAINST A TAG REF by tag-release.yml
# (`gh workflow run release.yml --ref <tag>`). Because it then runs on the tag
# ref, `cosign sign-blob` produces the keyless identity
#   https://github.com/OE5XRX/linux-image/.github/workflows/release.yml@refs/tags/<tag>
# which is exactly what station-manager verifies against. (GITHUB_TOKEN-pushed
# tags do NOT trigger on:push — recursion guard — but workflow_dispatch is a
# documented GITHUB_TOKEN exception, so tag-release.yml dispatches us explicitly.)
#
# dry_run=true (dispatched manually on a BRANCH): build + gate only — skip the
# tag-format gate, signing, publishing and tag cleanup. Use it to validate the
# pipeline from a feature branch.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + gate only; do not validate-tag/sign/publish/cleanup"
        type: boolean
        default: false

permissions:
  contents: write       # publish release + delete the tag on failure
  id-token: write       # cosign keyless OIDC token
  actions: read         # download-artifact from called workflows

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # The tag-format gate the operator asked for. Runs as a job ALWAYS so the
  # needs-chain stays intact in dry_run; the check itself is skipped on dry_run
  # (a manual branch dispatch has no tag ref). workflow_dispatch can be fired
  # against any ref, so the sign/publish path must only ever run for a
  # well-formed release tag.
  validate-tag:
    name: Validate tag format
    runs-on: ubuntu-latest
    steps:
      - name: Require a well-formed tag ref
        if: ${{ !inputs.dry_run }}
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF" in
            refs/tags/*) : ;;
            *) echo "::error::a real release must run on a tag ref (dispatched by tag-release.yml), got '$REF'"; exit 1 ;;
          esac
          # Same TAG_RE as scripts/compute-release-version.sh — keep in sync.
          if ! printf '%s' "$REF_NAME" | grep -Eq '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]{2}[a-z]?$'; then
            echo "::error::tag '$REF_NAME' is not a valid release tag (YYYY.MM.DD-HH[a-z])"
            exit 1
          fi
          echo "tag $REF_NAME OK"

  preflight:
    name: Preflight
    needs: validate-tag
    uses: ./.github/workflows/preflight.yml

  # Resolve the previous release (slot A for the gate's cross-build OTA test).
  # The current tag has no release yet (published at the end of this run), so the
  # latest existing release IS the previous one.
  resolve-slot-a:
    name: Resolve slot A (previous release)
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      last_release: ${{ steps.last.outputs.tag }}
    steps:
      - name: Resolve previous release
        id: last
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag=$(gh release list -R "$REPO" -L 1 --exclude-drafts --exclude-pre-releases --json tagName -q '.[0].tagName' || true)
          echo "Previous release: ${tag:-<none>}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-x64:
    name: Build qemux86-64
    needs: [validate-tag, preflight]
    uses: ./.github/workflows/build.yml
    with:
      machine: qemux86-64
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  build-rpi:
    name: Build raspberrypi4-64
    # Each target has its own cache volume, so the two builds run in parallel.
    needs: [validate-tag, preflight]
    uses: ./.github/workflows/build.yml
    with:
      machine: raspberrypi4-64
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  gate:
    name: Boot & OTA gate (x64)
    # The publish gate: boot the freshly built x86 image and run the cross-build
    # OTA cycle (slot A = previous release). Publication depends on this passing.
    needs: [resolve-slot-a, build-x64]
    uses: ./.github/workflows/boot-ota-test.yml
    with:
      machine: qemux86-64
      new_artifact: yocto-image-qemux86-64
      expected_tag: ${{ github.ref_name }}
      last_release_tag: ${{ needs.resolve-slot-a.outputs.last_release }}
    secrets: inherit

  release:
    name: Sign & Publish Release
    needs: [validate-tag, build-x64, build-rpi, gate]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download x86-64 artifact
        uses: actions/download-artifact@v8
        with:
          name: yocto-image-qemux86-64
          path: staging/qemux86-64

      - name: Download Raspberry Pi artifact
        uses: actions/download-artifact@v8
        with:
          name: yocto-image-raspberrypi4-64
          path: staging/raspberrypi4-64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Package, checksum, sign
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release
          for machine in qemux86-64 raspberrypi4-64; do
            src=""
            srcext=""
            for ext in wic.bz2 wic.xz wic.gz wic; do
              match=$(ls "staging/${machine}"/*.${ext} 2>/dev/null | head -1 || true)
              if [ -n "${match}" ]; then
                src="${match}"
                srcext="${ext}"
                break
              fi
            done
            if [ -z "${src}" ]; then
              echo "No image artifact for ${machine}" >&2
              exit 1
            fi

            dest="release/oe5xrx-${machine}-${TAG}.${srcext}"
            cp "${src}" "${dest}"
            (cd release && sha256sum "$(basename "${dest}")" > "$(basename "${dest}").sha256")

            cosign sign-blob --yes \
              --bundle "${dest}.bundle" \
              "${dest}"
          done
          ls -lh release/

      - name: Create GitHub Release
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/oe5xrx-*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## OE5XRX Linux Image ${{ env.TAG }}

            Pre-built Yocto images for both supported targets. Published only
            after passing the boot + cross-build OTA integration gate.

            | Target | File |
            |---|---|
            | Raspberry Pi CM4 | `oe5xrx-raspberrypi4-64-${{ env.TAG }}.wic.bz2` |
            | QEMU x86-64 | `oe5xrx-qemux86-64-${{ env.TAG }}.wic.bz2` |

            Each image ships with a `.sha256` checksum and a `.bundle`
            cosign signature. Verification instructions are in
            [SECURITY.md](https://github.com/${{ env.REPO }}/blob/main/SECURITY.md).

  # A real release run creates no tag itself — the tag already exists (pushed by
  # tag-release.yml). If the build/gate/sign fails, delete that tag so a failed
  # attempt leaves nothing behind (mirrors the old "no tag until the gate passes"
  # property). To retry, re-dispatch tag-release.yml (it computes a fresh tag) —
  # a re-run of this workflow would target the now-deleted ref.
  cleanup:
    name: Delete tag on failure
    # validate-tag is intentionally NOT a dependency: if it fails the tag is
    # malformed (only reachable by a manual dispatch against a bad tag), and we
    # must not auto-delete a tag this flow didn't create. All downstream jobs are
    # then skipped (not failed), so failure() stays false and cleanup won't run.
    # A failure in the real work below IS on a good tag → delete it.
    needs: [preflight, resolve-slot-a, build-x64, build-rpi, gate, release]
    if: ${{ failure() && !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Delete the release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Release run failed — deleting tag '$REF_NAME' so nothing dangles"
          git push origin ":refs/tags/${REF_NAME}" || echo "tag '$REF_NAME' already gone"
