header:
  version: 15
  includes:
    - oe5xrx.yml

machine: qemux86-64

local_conf_header:
  qemu: |
    # QEMU x64 test image — mirrors the RPi production image as closely as
    # possible (A/B rootfs, read-only /, data partition), substituting
    # GRUB-EFI for U-Boot.
    EXTRA_IMAGE_FEATURES += "allow-empty-password allow-root-login empty-root-password post-install-logging"
    # OVMF provides UEFI firmware for QEMU so GRUB-EFI can boot.
    EFI_PROVIDER = "grub-efi"
    # Ensure the kernel installs bzImage to /boot on the EFI partition.
    MACHINE_ESSENTIAL_EXTRA_RDEPENDS += "kernel-image"
    # linux-raspberrypi only exists in the RPi build (meta-raspberrypi). Its
    # machine-specific kernel bbappend in meta-oe5xrx-remotestation would be a
    # dangling (fatal) append here, so mask JUST that file on x86 — this keeps
    # strict dangling-append detection on for every other append and both builds.
    BBMASK += "meta-oe5xrx-remotestation/recipes-kernel/linux/linux-raspberrypi_%.bbappend"
